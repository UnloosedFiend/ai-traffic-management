<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Traffic Management System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #111133 50%, #0a0a1a 100%);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .landing-container {
            width: 520px;
            background: rgba(15, 15, 35, 0.95);
            border-radius: 20px;
            border: 1px solid rgba(0, 200, 255, 0.15);
            box-shadow: 0 0 60px rgba(0, 150, 255, 0.08), 0 20px 60px rgba(0,0,0,0.5);
            padding: 40px 36px 36px;
            position: relative;
            overflow: hidden;
        }

        .landing-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, #00c8ff, #00ff88, #00c8ff);
        }

        .logo-section {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo-icon { font-size: 46px; margin-bottom: 8px; }
        .logo-section h1 {
            font-size: 1.55em;
            font-weight: 700;
            color: #00d4ff;
            letter-spacing: 0.5px;
        }
        .logo-section p {
            font-size: 0.82em;
            color: #7a8ba8;
            margin-top: 4px;
        }

        .section-title {
            font-size: 0.78em;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #5a7a9a;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.06);
        }

        .input-group { margin-bottom: 12px; }
        .input-group label {
            display: block;
            font-size: 0.78em;
            color: #8899aa;
            margin-bottom: 5px;
            font-weight: 500;
        }
        .input-group input {
            width: 100%;
            padding: 11px 14px;
            background: rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 0.92em;
            font-family: 'Consolas', 'Courier New', monospace;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .input-group input:focus {
            outline: none;
            border-color: #00c8ff;
            box-shadow: 0 0 12px rgba(0, 200, 255, 0.15);
        }
        .input-group input::placeholder { color: #445566; }

        .camera-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .pi-row {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 10px;
            margin-bottom: 28px;
        }

        .start-btn {
            width: 100%;
            padding: 14px;
            font-size: 1.05em;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #fff;
            background: linear-gradient(135deg, #0077cc, #00bbff);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.25s, opacity 0.2s;
            box-shadow: 0 4px 20px rgba(0, 150, 255, 0.25);
        }
        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 28px rgba(0, 180, 255, 0.35);
        }
        .start-btn:active { transform: translateY(0); }
        .start-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .status-msg {
            text-align: center;
            margin-top: 14px;
            font-size: 0.82em;
            min-height: 20px;
        }
        .status-msg.error { color: #ff5566; }
        .status-msg.success { color: #00ff88; }
        .status-msg.loading { color: #ffbb33; }

        .spinner {
            display: inline-block;
            width: 14px; height: 14px;
            border: 2px solid rgba(255,255,255,0.2);
            border-top-color: #ffbb33;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="landing-container">
    <div class="logo-section">
        <div class="logo-icon">&#x1F6A6;</div>
        <h1>AI Traffic Management</h1>
        <p>Enter camera &amp; Raspberry Pi details to begin</p>
    </div>

    <div class="section-title">Camera IP Addresses</div>
    <div class="camera-inputs">
        <div class="input-group">
            <label>Camera 1 &#8212; NORTH</label>
            <input type="text" id="cam0" placeholder="192.168.1.101:8080">
        </div>
        <div class="input-group">
            <label>Camera 2 &#8212; EAST</label>
            <input type="text" id="cam1" placeholder="192.168.1.102:8080">
        </div>
        <div class="input-group">
            <label>Camera 3 &#8212; SOUTH</label>
            <input type="text" id="cam2" placeholder="192.168.1.103:8080">
        </div>
        <div class="input-group">
            <label>Camera 4 &#8212; WEST</label>
            <input type="text" id="cam3" placeholder="192.168.1.104:8080">
        </div>
    </div>

    <div class="section-title">Raspberry Pi</div>
    <div class="pi-row">
        <div class="input-group">
            <label>Pi IP Address</label>
            <input type="text" id="piIp" placeholder="192.168.1.200">
        </div>
        <div class="input-group">
            <label>Pi Port</label>
            <input type="number" id="piPort" value="5000" placeholder="5000">
        </div>
    </div>

    <button class="start-btn" id="startBtn" onclick="startSystem()">
        &#9654;&nbsp; Start System
    </button>
    <div class="status-msg" id="statusMsg"></div>
</div>

<script>
    ['cam0','cam1','cam2','cam3','piIp','piPort'].forEach(id => {
        const saved = localStorage.getItem('atm_' + id);
        if (saved) document.getElementById(id).value = saved;
    });

    async function startSystem() {
        const btn = document.getElementById('startBtn');
        const msg = document.getElementById('statusMsg');

        const cameras = {};
        let hasCamera = false;
        for (let i = 0; i < 4; i++) {
            const val = document.getElementById('cam' + i).value.trim();
            if (val) {
                let url = val;
                if (!url.startsWith('http')) url = 'http://' + url;
                if (!url.includes('/video')) url += '/video';
                cameras[i] = url;
                hasCamera = true;
            }
        }

        if (!hasCamera) {
            msg.className = 'status-msg error';
            msg.textContent = 'Please enter at least one camera IP address.';
            return;
        }

        const piIp = document.getElementById('piIp').value.trim();
        const piPort = parseInt(document.getElementById('piPort').value) || 5000;

        for (let i = 0; i < 4; i++) localStorage.setItem('atm_cam' + i, document.getElementById('cam' + i).value);
        localStorage.setItem('atm_piIp', piIp);
        localStorage.setItem('atm_piPort', piPort);

        btn.disabled = true;
        msg.className = 'status-msg loading';
        msg.innerHTML = '<span class="spinner"></span>Starting system...';

        try {
            const resp = await fetch('/api/start', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ cameras, pi_ip: piIp, pi_port: piPort })
            });
            const data = await resp.json();

            if (data.status === 'ok') {
                msg.className = 'status-msg success';
                msg.textContent = 'System started! Redirecting...';
                setTimeout(() => { window.location.href = '/dashboard'; }, 600);
            } else {
                msg.className = 'status-msg error';
                msg.textContent = data.message || 'Failed to start system.';
                btn.disabled = false;
            }
        } catch (e) {
            msg.className = 'status-msg error';
            msg.textContent = 'Connection error: ' + e.message;
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
